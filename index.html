<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - MILOS TRIVIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="terminal-content">
            <h1 id="typewriter-text" class="neon-text"></h1>
            <button id="btn-deploy" class="hidden">[ INICIAR PROTOCOLO ]</button>
        </div>
    </div>

    <header id="game-ui" class="hidden">
        <div id="top-controls">
            <label class="vol-label" title="Volumen General">
                VOL: <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </label>
            <button id="btn-neon-toggle" class="btn-neon-tiny">BORDE NEÓN: OFF</button>
        </div>
        
        <div class="main-controls">
            <button id="start-game-btn" class="btn-neon-small">INICIAR TRIVIA</button>
            <div id="timer-container">TIEMPO: <span id="timer-count">180</span>s</div>
        </div>
    </header>

    <main id="milos-grid" class="hidden">
        <div class="milos-frame" id="bg-1">
            <div class="milos-card" onclick="flipCard(this)">
                <div class="milos-front">
                    <video class="milos-v" loop muted playsinline><source src="assets/listo_9.mp4" type="video/mp4"></video>
                </div>
                <div class="milos-back">
                    <div class="quiz-box" onclick="event.stopPropagation()">
                        <p>¿Canción?</p>
                        <div class="progress-container"><div class="progress-bar" id="pb-1"></div></div>
                        <div class="options">
                            <label><input type="radio" name="q1" value="A"> Maomeno</label>
                            <label><input type="radio" name="q1" value="B"> Beso en la boca</label>
                            <label><input type="radio" name="q1" value="C"> Yo quiero bailar</label>
                        </div>
                        <button class="btn-send" onclick="lockCard(this, 1)">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>

    <div id="results-screen" class="hidden final-overlay results-neon">
        <h1>RESULTADOS</h1>
        <div id="score-display">0 / 9</div>
        <div id="prize-zone"></div>
        <button id="btn-restart-results" class="btn-neon">REINTENTAR (1)</button>
    </div>

    <div id="timeout-screen" class="hidden final-overlay">
        <div class="spotlight"><div class="sad-clock"></div></div>
        <h2 class="neon-text-blue">TIEMPO AGOTADO</h2>
        <button id="btn-restart-timeout" class="btn-neon">ÚLTIMO INTENTO</button>
    </div>

    <audio id="milos-audio-bg" loop preload="auto" src="assets/musica.mp3"></audio>
    <audio id="trivia-audio" preload="auto"></audio>

    <script src="script.js"></script>
